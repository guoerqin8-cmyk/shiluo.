    <header class="header" id="main-header">

            <div id="music-btn" class="music-btn">

                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>

        <div id="poet-content">

                    <div>
                        <h2 id="poet-name" class="card-title font-calligraphy" style="font-size: 36px;"></h2>
                        <p style="margin-bottom: 10px; color: #5a5a5a;">

                        </p>
                        <div id="poet-bio" style="text-align: left; line-height: 1.8;"></div>
                    </div>
                    <div class="img-container">
                        <img id="poet-image" src="" alt="诗人画像" style="max-width: 300px; border-radius: 50%;">
                        <p class="img-caption">诗人画像</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="card-title font-calligraphy">代表作品</h2>
                <ul id="poet-works" style="list-style: none; padding-left: 0;">
                </ul>
            </div>
        </div>

    <footer class="footer">
        <p>2026 诗络</p>
