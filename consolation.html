<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解忧问答 - 诗络</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header" id="main-header">
        <div class="header-content">
            <a href="index.html" class="logo">诗络</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="poem_moon.html">明月</a></li>
                    <li><a href="poem_homesick.html">乡愁</a></li>
                    <li><a href="poem_frustrated.html">宽慰</a></li>
                    <li><a href="poem_frontier.html">边塞</a></li>
                    <li><a href="consolation.html">解忧</a></li>
                    <li><a href="music_intro.html">音乐</a></li>
                    <li><a href="about.html">关于</a></li>
                </ul>
            </nav>
            <div id="music-btn" class="music-btn">
                <svg id="music-icon" viewBox="0 0 24 24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
        </div>
    </header>

    <main class="content">
        <h1 class="page-title font-calligraphy">解忧问答</h1>
        <p class="page-subtitle">倾诉烦恼 · 诗词疗愈</p>

        <div class="img-container">
            <img src="images/consolation.jpg" alt="解忧">
            <p class="img-caption">笔墨解忧</p>
        </div>

        <div class="card" style="max-width: 700px; margin: 0 auto;">
            <h2 class="card-title font-calligraphy">写下您的烦恼</h2>
            <p style="text-align: center; margin-bottom: 20px; color: #5a5a5a;">
                请在下方输入框中描述您的烦恼，系统将根据关键词为您匹配安慰诗词
            </p>
            <div class="input-group">
                <label for="trouble-input">倾诉心声：</label>
                <textarea id="trouble-input" placeholder="例如：最近感到很迷茫，不知道未来该怎么走..."></textarea>
            </div>
            <div style="text-align: center;">
                <button id="submit-consolation" class="btn btn-primary">获取安慰</button>
            </div>
            <div style="margin-top: 20px; text-align: center; color: #8b7355; font-size: 14px;">
                <p>支持识别的情绪关键词：迷茫、焦虑、想家、孤独、压力、失意、难过、离别</p>
            </div>
        </div>

        <div class="card" style="max-width: 700px; margin: 30px auto;">
            <h2 class="card-title font-calligraphy">经典宽慰诗句</h2>
            <div class="tag-cloud">
                <span style="background: rgba(168, 197, 217, 0.2); padding: 8px 15px; border-radius: 20px; color: #5a5a5a;">长风破浪会有时</span>
                <span style="background: rgba(168, 197, 217, 0.2); padding: 8px 15px; border-radius: 20px; color: #5a5a5a;">山重水复疑无路</span>
                <span style="background: rgba(168, 197, 217, 0.2); padding: 8px 15px; border-radius: 20px; color: #5a5a5a;">海内存知己</span>
                <span style="background: rgba(168, 197, 217, 0.2); padding: 8px 15px; border-radius: 20px; color: #5a5a5a;">采菊东篱下</span>
                <span style="background: rgba(168, 197, 217, 0.2); padding: 8px 15px; border-radius: 20px; color: #5a5a5a;">沉舟侧畔千帆过</span>
                <span style="background: rgba(168, 197, 217, 0.2); padding: 8px 15px; border-radius: 20px; color: #5a5a5a;">莫听穿林打叶声</span>
            </div>
        </div>
    </main>

    <div id="consolation-modal" class="scroll-modal">
        <div class="scroll-content">
            <div class="scroll-header">
                <div id="modal-close" class="scroll-close">×</div>
                <h3 id="modal-title" class="font-calligraphy"></h3>
            </div>
            <div class="scroll-body">
                <div class="img-container">
                    <img id="modal-image" src="" alt="配图" style="max-height: 200px;">
                </div>
                <div class="poem-content">
                    <p id="modal-poem"></p>
                </div>
                <div class="poem-author">
                    <span id="modal-author"></span>
                </div>
                <div class="explanation">
                    <p id="modal-explanation"></p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>2026 诗络</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
