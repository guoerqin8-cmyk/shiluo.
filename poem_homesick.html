    <main class="content">
        <h1 class="page-title font-calligraphy">乡愁羁旅</h1>
        <p class="page-subtitle">独在异乡为异客，每逢佳节倍思亲</p>

        <div class="img-container">
            <img src="images/homesick.jpg" alt="乡愁">
        </div>

        <div class="card">
            <h2 class="card-title font-calligraphy">九月九日忆山东兄弟</h2>
            <div class="poem-content">
                <p>独在异乡为异客，每逢佳节倍思亲。</p>
                <p>遥知兄弟登高处，遍插茱萸少一人。</p>
            </div>
            <div class="poem-author">
                <span class="author-link" data-poet="王维">王维</span>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title font-calligraphy">泊船瓜洲</h2>
            <div class="poem-content">
                <p>京口瓜洲一水间，钟山只隔数重山。</p>
                <p>春风又绿江南岸，明月何时照我还？</p>
            </div>
            <div class="poem-author">王安石</div>
        </div>

        <div class="card">
            <h2 class="card-title font-calligraphy">宿建德江</h2>
            <div class="poem-content">
                <p>移舟泊烟渚，日暮客愁新。</p>
                <p>野旷天低树，江清月近人。</p>
            </div>
            <div class="poem-author">
                <span class="author-link" data-poet="孟浩然">孟浩然</span>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title font-calligraphy">枫桥夜泊</h2>
            <div class="poem-content">
                <p>月落乌啼霜满天，江枫渔火对愁眠。</p>
                <p>姑苏城外寒山寺，夜半钟声到客船。</p>
            </div>
            <div class="poem-author">张继</div>
        </div>
    </main>

    <footer class="footer">
